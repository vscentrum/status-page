content: >
  <p>
  <strong>[Thu 28 May 2026 - 15:50:00 CEST]</strong><br/>
  HPC-UGent Tier-2 login nodes were rebooted to disable the CIFS kernel module,
  to mitigate a known security issue. As a result, access to UGent shares is temporarily unavailable.
  </p>
