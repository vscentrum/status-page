meta_data:
  title: Tier-1 Cloud VMs rebooting for security updates
  start_date: 2026-07-09 09:30:00
  end_date: 2026-07-09 13:00:00
  affected: tier1_cloud
  level: medium
  planned: no
content: >
  <p>
  <b>[Thu 09 Jul 2026 - 09:30:00]</b><br/>
  To mitigate a recently disclosed security vulnerability, all Tier-1 Cloud virtual machines are currently being rebooted.
  During the reboot, VMs will be unreachable for a short period of time and active connections will be dropped.
  </p>
  <p>
  We expect to finish this operation by tomorrow morning.
  </p>
  <p>
  <b>[Thu 09 Jul 2026 - 12:40:00]</b><br/>
  Update: this operation has been completed ahead of schedule. All VMs have been rebooted.
  </p>
