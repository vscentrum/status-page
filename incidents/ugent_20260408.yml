meta_data:
  title: Problem with SSL certificate affecting VSC accountpage (account.vscentrum.be)
  start_date: 2026-04-08 08:46:00
  end_date: 
  affected: tier2_gent, tier1_compute, tier1_cloud
  level: high
  planned: no
content: >
  <p>
  Due to a problem with creating new SSL certificates for account.vscentrum.be,
  a security warning is shown in some internet browsers (definitely Firefox).
  </p>
  <p>
  This affects the VSC accountpage (https://account.vscentrum.be), but also other services
  that rely on it, including the HPC-UGent Tier-2 web portal (https://login.hpc.ugent.be)
  and VSC Hortense Tier-1 web portal (https://tier1.hpc.ugent.be).
  </p>
  <p>
  We are trying to resolve the problem as soon as possible.
  </p>
  <p>
  As a temporary workaround, you can try using a different browser: Chrome and Safari are currently not affected (yet).
  </p>
