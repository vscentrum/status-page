meta_data:
  title: Tier-1 sofia - access closed for security reasons
  start_date: 2026-07-04 02:00:00
  end_date: 
  affected: tier1_compute
  level: high
  planned: no
content: >
  <b>[Sat 04 Jul 2026 - 02:00:00]</b><br/>
  Due to a new critical vulnerability recently disclosed, all access to
  VSC Tier-1 cluster <b>sofia</b> is closed.
  This measure includes the following services on <b>sofia</b>:
  <ul>
  <li>SSH connections through the terminal interface</li>
  <li>OnDemand sessions through portal.hpc.vub.be</li>
  <li>Remote sessions with tunneling such as VS Code applications</li>
  </ul>
  </p>
  <p>
  Users can still access their data on the cluster through Globus.
  </p>
  <p>
  This is a preemptive action to avoid any damage on the HPC system and user's data
  in it. At the time of closure, no intrusion in Tier-1 <b>sofia</b> occurred.
  </p>
  <p>
  We are currently working on solving this new critical vulnerability on all
  our systems as soon as possible. However, we cannot yet provide a timeline
  for the complete resolution of this issue as we still need to complete our
  investigation on it.
  </p>
