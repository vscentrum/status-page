meta_data:
  title: General issue with certificate 
  start_date: 2026-04-07 22:41:00
  end_date: 
  affected: tier2_leuven,tier1_data
  level: medium
  planned: no
content: |-

 **Update(2026-04-08:08:00:00)**: Tier-1 Data login and job submission issues were resolved. The reservation has been removed.
 Terminal login to the cluster should be fine if you first retrieve a certificate with 'ssh -l vscXXXXX firewall.vscentrum.be -A' in your agent and then login to the cluster.
 Ondemand access and firewall challange loop when logging in will be resolved soon.
 
 Due to a bug at our certificate supplier, an urgent, unplanned intervention is required. This also might affect login to the Tier-2 cluster and the Tier-1 Data platform.
 As there may be issues with job submission, a whole-system reservation has been put in place on the cluster, preventing new jobs from starting.
 The team is working to resolve this as quickly as possible and apologize for the inconvenience.
