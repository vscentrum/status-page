meta_data:
  title: Tier-1 cluster Hortense - access closed for security reasons
  start_date: 2026-07-04 10:00:00
  end_date: 
  affected: tier1_compute
  level: high
  planned: no
content: >
  <b>[Sat 04 Jul 2026 - 10:00:00]</b><br/>
  Due to a new critical vulnerability recently disclosed, all access to the UGent - HPC
  Tier-1 cluster is closed.
  This measure includes the following services:
  <ul>
  <li>SSH connections through the terminal interface</li>
  <li>OnDemand sessions through tier1.hpc.ugent.be</li>
  <li>Remote sessions with tunneling such as VS Code applications</li>
  </ul>
  </p>
  <p>
  This is a preemptive action to avoid any damage on the HPC system and user's data
  in it.
  </p>
  <b>[Update 9 July 2026 - 10:30:00]</b><br/>
  Due to multiple security vulnerabilities, access to the Tier-1 Hortense login nodes and web portal remains closed off.
  We expect the system will remain unavailable until after the announced downtime of 11 July 2026.
  As soon as mitigations are available, we will do what we can to deploy them and restore access as soon as possible.
  </p>
  <p>
  It remains possible to access your data on the Tier-1 Hortense storage via Globus https://www.globus.org/.<br/>
  Check out https://docs.vscentrum.be/globus/index.html for more information.
  Search for the 'VSC UGent Tier1 projects' collection.
  </p>
