meta_data:
  title: Power outage in UGent Data Center - Tier1 Hortense unavailable
  start_date: 2026-06-30 10:50:00
  end_date: 2026-07-01 10:30:00
  affected: tier1_compute
  level: high
  planned: no
content: >
  <p>
  The Tier1-Hortense infrastructure has suffered from an unexpected short power outage in the data center.
  <ul>
  <li> Most compute nodes went offline. Jobs that were running on these nodes were likely lost and should be resubmitted. </li>
  <li> The Tier-1 filesystem is showing issues due to the unexpected interruption. </li>
  </ul>
  </p>
  
  <p>
  We are trying to find a solution for this as soon as possible.
  A.o. we have escalated these filesystem issues with our hardware vendor.
  </p>

  <p>
  Until the filesystem errors are resolved, Tier-1 Hortense remains unavailable.
  This includes all Tier1 workernodes, login and debug nodes, and the dedicated Tier1 scratch filesystem.
  </p>

  <p>
  Update 1/07/2026 10:00
  The filesystem issue was fixed and has been running stable since 30/06/2026 evening.
  The majority of nodes are now back available and accepting jobs.
  </p>
