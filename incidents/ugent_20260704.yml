meta_data:
  title: UGent - HPC Tier-2 clusters - access closed for security reasons
  start_date: 2026-07-04 10:00:00
  end_date: 
  affected: tier2_gent
  level: high
  planned: no
content: >
  <p>
  <b>[Update 9 July 2026 - 10:30:00]</b><br/>
  Due to multiple consecutive security vulnerabilities, access to the HPC-UGent Tier-2 login nodes and web portal remains closed off.
  This measure includes the following services:
  <ul>
  <li>SSH connections through the terminal interface</li>
  <li>OnDemand sessions through login.hpc.ugent.be</li>
  <li>Remote sessions with tunneling such as VS Code applications</li>
  </ul>
  We expect all systems will remain unavailable until after the announced downtime of 11 July 2026.
  As soon as mitigations are available, we will do what we can to deploy them and restore access as soon as possible.
  </p>
  <p>
  It remains possible to access your data on the Tier-2 shared storage via Globus https://www.globus.org/.<br/>
  Check out https://docs.vscentrum.be/globus/index.html for more information.
  Search for the 'VSC UGent Tier2 filesystems' collection.
  </p>
