meta_data:
  title: Login nodes unavailable due to critical security vulnerability
  start_date: 2026-05-16 12:37:00
  end_date:
  affected: tier2_gent, tier1_compute
  level: high
  planned: no
content: >
  <p>
  <strong>[Thu 21 May 2026 - 17:35:00]</strong><br/>
  Update: We have deployed a mitigation for the security vulnerability on VSC Tier-1 Hortense.
  Access to the VSC Tier-1 Hortense login nodes and web portal has been restored.
  </p>
  <p>
  We are actively deploying a mitigation for the security vulnerability on HPC-UGent Tier-2.
  We are doing what we can to restore access as soon as possible, hopefully by the end of this week.
  </p>
  <p>
  <strong>[Mon 18 May 2026 - 15:17:00]</strong><br/>
  Update: We are actively working on a fix for the security vulnerability.
  Resolving the issue is likely to take several days.
  </p>
  <p>
  Due to a critical security vulnerability, access to the HPC-UGent Tier-2 and VSC Tier-1 Hortense login nodes was closed
  for all VSC accounts on Saturday 16 May 2026 at 12:37 CEST.
  </p>
  <p>
  Access to both the HPC-UGent Tier-2 and VSC Tier-1 Hortense infrastructure will remain unavailable
  until a fix has been deployed.
  </p>
