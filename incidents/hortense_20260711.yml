meta_data:
  title: UGent datacenter test & decommissioning of first Hortense phase
  start_date: 2026-07-11 08:00:00
  end_date: 2026-07-11 18:00:00
  affected: tier1_compute
  level: high
  planned: yes
content: >
  <p>
  On Saturday 11 July 2026, a planned test of the UGent datacenter S10 Disaster Recovery Procedure (DRP) will take place.
  Due to technical constraints, we will have to switch off Tier1 Hortense entirely.
  All Tier1 workernodes, login and debug nodes, and the dedicated Tier1 scratch filesystem will not be available.
  Please be aware that you will not be able to access any data located on the Tier1 Hortense system this day.
  </p>

  <p> On 11 July, the entire first phase of Tier1 Hortense will also be decommissioned.
  This phase was actually already end of life November 2025, but was kept online until the advent of the new VSC Tier-1 supercomputer sofia.
  This implies that all partitions of this phase will disappear and will no longer be available.
  Specifically: cpu_rome_rhel9, cpu_rome_all_rhel9, cpu_rome_512_rhel9, gpu_rome_a100_40_rhel9
  Please make sure to adjust your workflows and jobscripts accordingly.
  </p>
