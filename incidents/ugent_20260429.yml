meta_data:
  title: Login nodes unavailable due to critical security vulnerability
  start_date: 2026-04-29 22:32:00
  end_date: 
  affected: tier2_gent, tier1_compute
  level: high
  planned: no
content: >
  <p>
  *[Thu 29 Apr 2026 - 11:48:00]*<br/>
  Update: We are actively deploying a mitigation for the security problem.
  All running jobs have been cancelled, to expedite updating and rebooting all login and worker nodes.
  We are doing what we can to restore access to the systems ASAP.
  </p>
  <p>
  *[Wed 29 Apr 2026 - 22:32:00]*<br/>
  Due to a critical security vulnerability, access to the HPC-UGent Tier-2 and VSC Tier-1 Hortense login nodes was closed
  for all VSC accounts on Wednesday 29 April 2026 at 22:32 CEST.
  </p>
  <p>
  Access to both the HPC-UGent Tier-2 and VSC Tier-1 Hortense infrastructure will remain unavailable
  until a fix has been deployed.
  </p>
