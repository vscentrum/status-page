meta_data:
  title: Tier-2 clusters unavailable due to Lustre issue
  start_date: 2026-06-26 07:00:00
  end_date: 2026-06-29 17:00:00
  affected: tier2_leuven
  level: high
  planned: no
content: >
  <p>
  [16:00] We now believe that the root cause has been identified and resolved. Both wICE and Genius
  have been released. This status message will be kept open for a wile to inform users about the
  resolution.
  </p>

  <p>
  [10:30] Issues with the Lustre file system have reappeared. Until further notice,
  no new jobs will start on wICE and Genius. Access to Lustre (staging and $VSC_SCRATCH_LUSTRE1)
  is expected to be unavailable.
  </p>

  <p>
  [08:20] The Lustre file system available again, we will release the cluster soon.
  </p>

  <p>
  [07:00] The Lustre file system is not available at the moment and because of this, the Genius and
  wICE clusters have been reserved so no further jobs can start. Also from the login nodes, access to
  Lustre is not possible. Running jobs which were using Lustre (scratch and/or staging) probably failed.
  You can request a credit refund for large jobs.
  </p>
