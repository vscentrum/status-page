meta_data:
  title: Maintenance updates on Tier-2 compute nodes due to critical security vulnerability
  start_date: 2026-04-30 07:25:00
  end_date: 2026-05-04 16:00:00
  affected: tier2_leuven
  level: medium
  planned: no
content: >
  <p>
  *[Mon 04 May 2026 - 10:00:00]*<br/>
  The Genius CPU nodes have now been released as well. Superdome has been retired slightly ahead of schedule and will therefore remain unavailable.
  </p>
  <p>
  *[Mon 04 May 2026 - 08:50:00]*<br/>
  Update: The blocking reservations have now been released on the compute nodes of Mindwell, wICE (except for the batch_sapphirerapids partition) and the Genius GPU nodes. The remaining partitions will follow later today. Note that all Genius compute and login nodes needed to be migrated to Rocky Linux 9 in the process.
  </p>
  <p>
  *[Thu 30 Apr 2026 - 13:00:00]*<br/>
  Update: Selected login nodes are now accessible again now that the security concern has been mitigated on these nodes.

  The Genius, wICE and Mindwell compute nodes remain under reservation (new jobs are not yet allowed to start).
  </p>
  <p>
  *[Thu 30 Apr 2026 - 07:30:00]*<br/>
  Due to a critical security vulnerability, access to the KU Leuven / UHasselt Tier-2 clusters has been closed. This includes the login nodes as well as the OnDemand apps. Access will only be restored when a fix has been deployed.
  </p>
