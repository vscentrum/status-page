meta_data:
  title: Power outage in UGent Data Center impacting UGent Tier2 systems
  start_date: 2026-06-30 10:50:00
  end_date: 2026-06-30 14:00:00
  affected: tier2_gent
  level: high
  planned: no
content: >
  <p>
  We had a short power outage in the data center, most of the compute nodes in Tier1-Hortense and Tier2 Gent
  infrastructure are currently offline. 
  You should check those jobs that were running, and you might have to resubmit them.
  We are working on to solve a problem. 
  </p>
  <p>
  Update 30/06/2026 14:00
  All Tier2 clusters are back available and accepting jobs.
  </p>
